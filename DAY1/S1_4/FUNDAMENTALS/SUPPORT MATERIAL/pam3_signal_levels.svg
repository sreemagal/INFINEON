<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>PAM-3 signal showing three voltage levels over time</title>
<desc>A waveform diagram showing how PAM-3 encodes symbols using three voltage levels: +V, 0, and -V, with eight symbol periods illustrated</desc>
<style>
  svg { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Y axis -->
<line x1="80" y1="40" x2="80" y2="290" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="80" y1="290" x2="80" y2="40" stroke="#73726c" stroke-width="1" marker-end="url(#arrow)"/>

<!-- X axis (time) -->
<line x1="60" y1="165" x2="650" y2="165" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- Voltage level reference lines -->
<line x1="90" y1="75" x2="640" y2="75" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.5"/>
<line x1="90" y1="255" x2="640" y2="255" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.5"/>

<!-- Y-axis labels -->
<text class="th" x="50" y="79" text-anchor="middle" dominant-baseline="central">+V</text>
<text class="th" x="50" y="169" text-anchor="middle" dominant-baseline="central">0</text>
<text class="th" x="50" y="259" text-anchor="middle" dominant-baseline="central">−V</text>

<!-- Axis title -->
<text class="ts" x="370" y="310" text-anchor="middle">Time (symbol periods)</text>
<text class="ts" x="24" y="165" text-anchor="middle" transform="rotate(-90 24 165)">Voltage</text>

<!-- PAM-3 Waveform: sequence +V, 0, -V, +V, +V, -V, 0, +V -->
<line x1="100" y1="165" x2="100" y2="75" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="100" y1="75" x2="168" y2="75" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="168" y1="75" x2="168" y2="165" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="168" y1="165" x2="236" y2="165" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="236" y1="165" x2="236" y2="255" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="236" y1="255" x2="304" y2="255" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="304" y1="255" x2="304" y2="75" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="304" y1="75" x2="372" y2="75" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="372" y1="75" x2="440" y2="75" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="440" y1="75" x2="440" y2="255" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="440" y1="255" x2="508" y2="255" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="508" y1="255" x2="508" y2="165" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="508" y1="165" x2="576" y2="165" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="576" y1="165" x2="576" y2="75" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<line x1="576" y1="75" x2="640" y2="75" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>

<!-- Symbol labels along bottom -->
<text class="ts" x="134" y="330" text-anchor="middle">+V</text>
<text class="ts" x="202" y="330" text-anchor="middle">0</text>
<text class="ts" x="270" y="330" text-anchor="middle">−V</text>
<text class="ts" x="338" y="330" text-anchor="middle">+V</text>
<text class="ts" x="406" y="330" text-anchor="middle">+V</text>
<text class="ts" x="474" y="330" text-anchor="middle">−V</text>
<text class="ts" x="542" y="330" text-anchor="middle">0</text>
<text class="ts" x="608" y="330" text-anchor="middle">+V</text>

<!-- Vertical dividers for symbol periods -->
<line x1="168" y1="50" x2="168" y2="295" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="236" y1="50" x2="236" y2="295" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="304" y1="50" x2="304" y2="295" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="372" y1="50" x2="372" y2="295" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="440" y1="50" x2="440" y2="295" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="508" y1="50" x2="508" y2="295" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="576" y1="50" x2="576" y2="295" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>

<!-- Dots at sample points -->
<circle cx="100" cy="75" r="4" fill="#1D9E75"/>
<circle cx="168" cy="165" r="4" fill="#1D9E75"/>
<circle cx="236" cy="255" r="4" fill="#1D9E75"/>
<circle cx="304" cy="75" r="4" fill="#1D9E75"/>
<circle cx="372" cy="75" r="4" fill="#1D9E75"/>
<circle cx="440" cy="255" r="4" fill="#1D9E75"/>
<circle cx="508" cy="165" r="4" fill="#1D9E75"/>
<circle cx="576" cy="75" r="4" fill="#1D9E75"/>
</svg>
