<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAM-5 Interactive Encoder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --surface-2: #1c2129;
    --border: rgba(255,255,255,0.08);
    --border-h: rgba(255,255,255,0.14);
    --text-1: #e6edf3;
    --text-2: #8b949e;
    --text-3: #6e7681;
    --coral: #D85A30;
    --coral-dim: rgba(216,90,48,0.15);
    --amber: #BA7517;
    --amber-dim: rgba(186,117,23,0.12);
    --teal: #1D9E75;
    --blue: #378ADD;
    --gray-dot: #888780;
    --accent: #D85A30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 760px;
  }

  /* Header */
  .header {
    margin-bottom: 36px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    color: var(--text-1);
  }
  .header h1 span {
    color: var(--coral);
  }
  .header p {
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.6;
    max-width: 560px;
  }

  /* Controls */
  .controls-section {
    margin-bottom: 24px;
  }
  .controls-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
  }
  .sym-controls {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
  }
  .sym-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .sym-col label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    font-weight: 400;
  }
  .sym-col select {
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    padding: 10px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-1);
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  .sym-col select:hover {
    border-color: var(--border-h);
  }
  .sym-col select:focus {
    outline: none;
    border-color: var(--coral);
    box-shadow: 0 0 0 3px var(--coral-dim);
  }

  /* Waveform card */
  .waveform-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px 16px;
    margin-bottom: 16px;
  }
  .waveform-card svg text {
    font-family: 'JetBrains Mono', monospace;
  }
  .wf-axis-label {
    fill: var(--text-3);
    font-size: 11px;
  }
  .wf-level-label {
    fill: var(--text-2);
    font-size: 12px;
    font-weight: 400;
  }
  .wf-sym-label {
    fill: var(--text-2);
    font-size: 11px;
  }

  /* Legend */
  .legend-row {
    display: flex;
    gap: 20px;
    margin-top: 12px;
    padding: 0 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-3);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }
  .legend-dot.round { border-radius: 50%; }

  /* Info row */
  .info-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .info-label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .info-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-1);
  }
  .info-val.accent { color: var(--coral); }

  /* Randomize button */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover {
    border-color: var(--border-h);
    color: var(--text-1);
    background: var(--surface-2);
  }
  .btn:active { transform: scale(0.97); }

  @media (max-width: 520px) {
    .sym-controls { grid-template-columns: repeat(4, 1fr); }
    .info-row { grid-template-columns: 1fr; }
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span>PAM-5</span> interactive encoder</h1>
    <p>Select a voltage level for each symbol slot and watch the transmitted waveform update in real time. Five levels (−2, −1, 0, +1, +2) encode ~2.32 bits per symbol.</p>
  </div>

  <div class="controls-section">
    <div class="controls-label">Symbol values</div>
    <div class="sym-controls" id="controls"></div>
  </div>

  <div class="waveform-card">
    <svg width="100%" viewBox="0 0 680 230" id="wf-svg">
      <!-- Axes -->
      <line x1="55" y1="15" x2="55" y2="200" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
      <line x1="55" y1="200" x2="655" y2="200" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
      <text class="wf-axis-label" x="668" y="204" text-anchor="end">t</text>
      <text class="wf-axis-label" x="30" y="18" text-anchor="middle" font-style="italic">V</text>

      <!-- Y labels -->
      <text class="wf-level-label" x="42" y="34" text-anchor="end">+2</text>
      <text class="wf-level-label" x="42" y="74" text-anchor="end">+1</text>
      <text class="wf-level-label" x="42" y="114" text-anchor="end">0</text>
      <text class="wf-level-label" x="42" y="154" text-anchor="end">−1</text>
      <text class="wf-level-label" x="42" y="194" text-anchor="end">−2</text>

      <!-- Level guides -->
      <line x1="55" y1="30" x2="650" y2="30" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="55" y1="70" x2="650" y2="70" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="55" y1="110" x2="650" y2="110" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" stroke-dasharray="2 4"/>
      <line x1="55" y1="150" x2="650" y2="150" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <line x1="55" y1="190" x2="650" y2="190" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

      <!-- Glow filter for the waveform -->
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Waveform -->
      <path id="waveform-glow" fill="none" stroke="#D85A30" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" filter="url(#glow)" d=""/>
      <path id="waveform-path" fill="none" stroke="#D85A30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d=""/>

      <!-- Sample dots -->
      <g id="wf-dots"></g>
      <!-- Symbol labels -->
      <g id="wf-labels"></g>
    </svg>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Transmitted signal</div>
      <div class="legend-item"><div class="legend-dot round" style="background:#BA7517"></div>Sample points</div>
    </div>
  </div>

  <div class="info-row">
    <div class="info-box">
      <div class="info-label">Sequence</div>
      <div class="info-val" id="seq-display" style="font-size:13px;">—</div>
    </div>
    <div class="info-box">
      <div class="info-label">Symbols</div>
      <div class="info-val accent" id="sym-count">8</div>
    </div>
    <div class="info-box">
      <div class="info-label">Info content</div>
      <div class="info-val" id="bit-content">—</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="randomize()">Randomize</button>
    <button class="btn" onclick="resetDefaults()">Reset</button>
  </div>
</div>

<script>
const NUM = 8;
const levelMap = { '2': 30, '1': 70, '0': 110, '-1': 150, '-2': 190 };
const colorMap = { '2': '#D85A30', '1': '#BA7517', '0': '#888780', '-1': '#1D9E75', '-2': '#378ADD' };
const defaults = [1, -2, 0, 2, -1, 1, -1, 2];
const levels = [2, 1, 0, -1, -2];

const ctrls = document.getElementById('controls');
const selects = [];

for (let i = 0; i < NUM; i++) {
  const col = document.createElement('div');
  col.className = 'sym-col';
  const lbl = document.createElement('label');
  lbl.textContent = 'S' + (i + 1);
  const sel = document.createElement('select');
  levels.forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = (v > 0 ? '+' : '') + v;
    if (v === defaults[i]) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', draw);
  col.appendChild(lbl);
  col.appendChild(sel);
  ctrls.appendChild(col);
  selects.push(sel);
}

function draw() {
  const vals = selects.map(s => parseInt(s.value));
  const startX = 75;
  const stepW = 72;

  let d = 'M' + startX + ' ' + levelMap[vals[0]];
  for (let i = 0; i < vals.length; i++) {
    const x1 = startX + i * stepW;
    const x2 = x1 + stepW;
    const y = levelMap[vals[i]];
    if (i === 0) { d += ' H' + x2; }
    else { d += ' V' + y + ' H' + x2; }
  }

  document.getElementById('waveform-path').setAttribute('d', d);
  document.getElementById('waveform-glow').setAttribute('d', d);

  let dotsHtml = '';
  let labelsHtml = '';
  for (let i = 0; i < vals.length; i++) {
    const cx = startX + i * stepW + stepW / 2;
    const cy = levelMap[vals[i]];
    dotsHtml += '<circle cx="' + cx + '" cy="' + cy + '" r="5" fill="' + colorMap[vals[i]] + '" stroke="' + colorMap[vals[i]] + '" stroke-width="3" stroke-opacity="0.2"/>';
    labelsHtml += '<text class="wf-sym-label" x="' + cx + '" y="218" text-anchor="middle">' + ((vals[i] > 0 ? '+' : '') + vals[i]) + '</text>';
  }
  document.getElementById('wf-dots').innerHTML = dotsHtml;
  document.getElementById('wf-labels').innerHTML = labelsHtml;

  document.getElementById('seq-display').textContent = vals.map(v => (v > 0 ? '+' : '') + v).join(', ');
  document.getElementById('sym-count').textContent = vals.length;
  document.getElementById('bit-content').textContent = (vals.length * Math.log2(5)).toFixed(1) + ' bits';
}

function randomize() {
  selects.forEach(sel => {
    const ri = Math.floor(Math.random() * levels.length);
    sel.value = levels[ri];
  });
  draw();
}

function resetDefaults() {
  selects.forEach((sel, i) => { sel.value = defaults[i]; });
  draw();
}

draw();
</script>
</body>
</html>
