<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Comparison of NRZ binary signaling versus PAM-3 signaling</title>
<desc>Two waveforms stacked vertically showing how NRZ uses 2 levels and PAM-3 uses 3 levels to carry the same data, with PAM-3 requiring fewer symbol periods</desc>
<style>
  svg { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TOP: NRZ Binary -->
<text class="th" x="40" y="30">NRZ binary (2 levels, 1 bit/symbol)</text>

<!-- Y axis labels -->
<text class="ts" x="68" y="68" text-anchor="end">+V</text>
<text class="ts" x="68" y="148" text-anchor="end">−V</text>

<!-- Reference lines -->
<line x1="80" y1="65" x2="640" y2="65" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="80" y1="145" x2="640" y2="145" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>

<!-- NRZ waveform: bits 1 0 1 1 0 0 1 0 -->
<line x1="80" y1="145" x2="80" y2="65" stroke="#378ADD" stroke-width="2.5"/>
<line x1="80" y1="65" x2="150" y2="65" stroke="#378ADD" stroke-width="2.5"/>
<line x1="150" y1="65" x2="150" y2="145" stroke="#378ADD" stroke-width="2.5"/>
<line x1="150" y1="145" x2="220" y2="145" stroke="#378ADD" stroke-width="2.5"/>
<line x1="220" y1="145" x2="220" y2="65" stroke="#378ADD" stroke-width="2.5"/>
<line x1="220" y1="65" x2="290" y2="65" stroke="#378ADD" stroke-width="2.5"/>
<line x1="290" y1="65" x2="360" y2="65" stroke="#378ADD" stroke-width="2.5"/>
<line x1="360" y1="65" x2="360" y2="145" stroke="#378ADD" stroke-width="2.5"/>
<line x1="360" y1="145" x2="430" y2="145" stroke="#378ADD" stroke-width="2.5"/>
<line x1="430" y1="145" x2="500" y2="145" stroke="#378ADD" stroke-width="2.5"/>
<line x1="500" y1="145" x2="500" y2="65" stroke="#378ADD" stroke-width="2.5"/>
<line x1="500" y1="65" x2="570" y2="65" stroke="#378ADD" stroke-width="2.5"/>
<line x1="570" y1="65" x2="570" y2="145" stroke="#378ADD" stroke-width="2.5"/>
<line x1="570" y1="145" x2="640" y2="145" stroke="#378ADD" stroke-width="2.5"/>

<!-- Bit labels -->
<text class="ts" x="115" y="175" text-anchor="middle">1</text>
<text class="ts" x="185" y="175" text-anchor="middle">0</text>
<text class="ts" x="255" y="175" text-anchor="middle">1</text>
<text class="ts" x="325" y="175" text-anchor="middle">1</text>
<text class="ts" x="395" y="175" text-anchor="middle">0</text>
<text class="ts" x="465" y="175" text-anchor="middle">0</text>
<text class="ts" x="535" y="175" text-anchor="middle">1</text>
<text class="ts" x="605" y="175" text-anchor="middle">0</text>
<text class="ts" x="360" y="195" text-anchor="middle">8 symbols → 8 bits</text>

<!-- Separator -->
<line x1="40" y1="215" x2="640" y2="215" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- BOTTOM: PAM-3 -->
<text class="th" x="40" y="240">PAM-3 (3 levels, ~1.585 bits/symbol)</text>

<!-- Y axis labels -->
<text class="ts" x="68" y="275" text-anchor="end">+V</text>
<text class="ts" x="68" y="335" text-anchor="end">0</text>
<text class="ts" x="68" y="395" text-anchor="end">−V</text>

<!-- Reference lines -->
<line x1="80" y1="275" x2="545" y2="275" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="80" y1="335" x2="545" y2="335" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>
<line x1="80" y1="395" x2="545" y2="395" stroke="#b4b2a9" stroke-width="0.3" stroke-dasharray="2 3" opacity="0.4"/>

<!-- PAM-3 waveform: encoding same 8 bits in ~5 symbols -->
<line x1="80" y1="335" x2="80" y2="275" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="80" y1="275" x2="172" y2="275" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="172" y1="275" x2="172" y2="395" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="172" y1="395" x2="264" y2="395" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="264" y1="395" x2="264" y2="275" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="264" y1="275" x2="356" y2="275" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="356" y1="275" x2="356" y2="335" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="356" y1="335" x2="448" y2="335" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="448" y1="335" x2="448" y2="275" stroke="#1D9E75" stroke-width="2.5"/>
<line x1="448" y1="275" x2="540" y2="275" stroke="#1D9E75" stroke-width="2.5"/>

<!-- Symbol labels -->
<text class="ts" x="126" y="420" text-anchor="middle">+V</text>
<text class="ts" x="218" y="420" text-anchor="middle">−V</text>
<text class="ts" x="310" y="420" text-anchor="middle">+V</text>
<text class="ts" x="402" y="420" text-anchor="middle">0</text>
<text class="ts" x="494" y="420" text-anchor="middle">+V</text>
<text class="ts" x="310" y="440" text-anchor="middle">5 symbols → ~8 bits (fewer transitions needed)</text>

<!-- Bracket showing bandwidth saving -->
<line x1="545" y1="270" x2="545" y2="400" stroke="#73726c" stroke-width="1"/>
<line x1="545" y1="335" x2="600" y2="335" stroke="#73726c" stroke-width="0.5" stroke-dasharray="2 3"/>
<text class="ts" x="608" y="325" text-anchor="start">~37% fewer</text>
<text class="ts" x="608" y="342" text-anchor="start">symbols</text>
</svg>
